<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>api.mettwasser.xyz</title>

        <link rel="stylesheet" href="/assets/index.css" />

        <script
            src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"
            async
        ></script>
        <script type="module" src="/assets/index.js" async></script>
    </head>
    <body class="text-gray-100 bg-neutral-800 font-serif">
        <main class="h-screen flex flex-col justify-center items-center">
            <h1
                class="text-2xl drop-shadow-gray font-extrabold sm:text-5xl"
                id="main-heading"
            ></h1>
            <h3 class="mt-5 text-base sm:text-2xl sm:mt-7" id="sub-heading">
                &nbsp;
            </h3>
            <div class="mt-5 flex sm:mt-7 opacity-0" id="socials">
                <a
                    href="https://discord.gg/73Fedzm7th"
                    class="group flex px-4 py-2 rounded-l-md justify-center items-center bg-[#5865F2] text-gray-100 text-base transition-all duration-300 sm:px-6 sm:py-3 sm:text-lg hover:bg-[#4752C4] hover:px-6 sm:hover:px-8"
                    >Discord
                    <iconify-icon
                        icon="ic:sharp-discord"
                        class="hidden ml-2 text-3xl transition-all duration-300 sm:inline-block group-hover:animate-pulse"
                    ></iconify-icon
                ></a>
                <a
                    href="/docs"
                    class="group flex px-4 py-2 justify-center items-center bg-green-600 text-gray-100 text-base transition-all duration-300 sm:px-6 sm:py-3 sm:text-lg hover:bg-green-700 hover:px-6 sm:hover:px-8"
                    >Docs
                    <iconify-icon
                        icon="material-symbols:menu-book"
                        class="hidden ml-2 text-3xl transition-all duration-300 sm:inline-block group-hover:animate-pulse"
                    ></iconify-icon
                ></a>
                <a
                    href="https://github.com/Mettwasser/api-mettwasser-xyz"
                    class="group flex px-4 py-2 rounded-r-md justify-center items-center bg-[#171515] text-gray-100 text-base transition-all duration-300 sm:px-6 sm:py-3 sm:text-lg hover:bg-[#221F1F] hover:px-6 sm:hover:px-8"
                    >GitHub
                    <iconify-icon
                        icon="mdi:github"
                        class="hidden ml-2 text-3xl transition-all duration-300 sm:inline-block group-hover:animate-pulse"
                    ></iconify-icon
                ></a>
            </div>
        </main>
    </body>
</html>
